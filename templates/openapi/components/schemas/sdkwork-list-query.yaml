SdkWorkListQuery:
  type: object
  additionalProperties: false
  description: Standard POST list/search request body for complex queries. Simple bounded lists MAY use GET query parameters instead.
  properties:
    page:
      type: integer
      format: int32
      minimum: 1
      default: 1
      description: One-based page index for offset pagination. Mutually exclusive with cursor.
    pageSize:
      type: integer
      format: int32
      minimum: 1
      maximum: 200
      default: 20
      description: Page size for offset or cursor pagination.
    cursor:
      type: [string, "null"]
      maxLength: 512
      description: Opaque cursor token from a previous response pageInfo.nextCursor.
    sort:
      type: [string, "null"]
      maxLength: 256
      pattern: '^-?[A-Za-z][A-Za-z0-9_]*(,-?[A-Za-z][A-Za-z0-9_]*)*$'
      description: Comma-separated sort fields. Prefix with `-` for descending order.
    q:
      type: [string, "null"]
      maxLength: 256
      description: Generic free-text search keyword.
    createdAfter:
      type: [string, "null"]
      format: date-time
    createdBefore:
      type: [string, "null"]
      format: date-time
    updatedAfter:
      type: [string, "null"]
      format: date-time
    updatedBefore:
      type: [string, "null"]
      format: date-time
    ids:
      type: array
      maxItems: 100
      items:
        type: string
        format: int64
        pattern: '^[0-9]+$'
        x-sdkwork-int64-string: true
      description: Restrict the query to explicit resource ids.

SdkWorkListQueryWithFilters:
  description: Domain list/search body. Extend SdkWorkListQuery with a typed filters object through allOf.
  allOf:
    - $ref: ./sdkwork-list-query.yaml#/SdkWorkListQuery
    - type: object
      additionalProperties: false
      properties:
        filters:
          type: object
          description: Domain-specific filter object. MUST be typed per API authority; free-form SQL-like expressions are forbidden.
