ProblemDetail:
  type: object
  additionalProperties: true
  required: [type, title, status, code, traceId]
  properties:
    type:
      type: string
      format: uri-reference
    title:
      type: string
    status:
      type: integer
      minimum: 100
      maximum: 599
    detail:
      type: string
    instance:
      type: string
      description: Request endpoint occurrence in the form `{METHOD} {routeTemplate}`.
    operationId:
      type: string
      description: OpenAPI operation id for the failing request when resolved by the web framework.
    code:
      type: integer
      format: int32
      description: Numeric error result code. MUST be non-zero. See API_SPEC.md §15.3.
      minimum: 40001
      maximum: 79999
    traceId:
      type: string
      format: uuid
      description: Server-owned request correlation id. Same semantics as SdkWorkApiResponse.traceId.
    i18nKey:
      type: string
      description: Optional stable localization key such as `errors.result.40001`. Presentation metadata only; does not replace numeric code.
    locale:
      type: string
      description: Optional effective BCP 47 locale used by framework message mapping.
    errors:
      type: array
      items:
        $ref: ./field-error.yaml#/FieldError
