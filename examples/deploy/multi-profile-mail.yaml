version: 1
defaultProfile: cloud.production

profiles:
  cloud.production:
    install:
      layout: source-tree
    expose:
      - domain: mail.sdkwork.com
        tls: sdkwork.com
        mode: web+api
        web: adaptive
    packages:
      - mini-program-weixin

  standalone.development:
    expose:
      - domain: localhost
        tls: off
        mode: web+api
        web: [pc, h5]
    packages: []
